<!-- index.html carousel -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Image Slider</h1>

        <div class="slider">
            <button class="nav-btn prev-btn">&#10094;</button>
            <div class="slides-container">
                <img src="https://picsum.photos/id/1015/800/400" alt="Slide 1" class="slide active">
                <img src="https://picsum.photos/id/1016/800/400" alt="Slide 2" class="slide">
                <img src="https://picsum.photos/id/1018/800/400" alt="Slide 3" class="slide">
                <img src="https://picsum.photos/id/1020/800/400" alt="Slide 4" class="slide">
            </div>
            <button class="nav-btn next-btn">&#10095;</button>
        </div>
        
        <div class="dots-container">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
        
    </div>

    <script src="script.js"></script>
</body>
</html>
